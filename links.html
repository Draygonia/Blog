<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Links &mdash; Draygonia</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="site-header">
    <div id="site-header-inner">
      <a id="site-logo" href="index.html">
        <div id="logo-box">D</div>
        <span id="logo-name">Draygonia</span>
      </a>
      <input type="search" id="site-search" placeholder="search...">
    </div>
  </div>

  <div id="admin-bar">
    <a href="admin.html" class="admin-btn">+ ADD</a>
    <a href="admin.html" class="admin-btn">MANAGE</a>
    <a href="index.html" class="admin-btn">&#8652; POSTS</a>
  </div>

  <div id="site-banner">
    <div id="banner-logo">
      <div id="banner-logo-box">D</div>
      <span id="banner-title">Draygonia</span>
    </div>
  </div>

  <div id="page-wrapper">

    <div id="main-content">
      <div class="panel">
        <div class="panel-header">
          <div class="panel-accent"></div>
          <span class="panel-title">Links</span>
        </div>
        <div class="panel-body" style="padding:0">
          <div id="links-grid">
            <div class="loading"><div class="spinner"></div> Loading links&hellip;</div>
          </div>
        </div>
      </div>
    </div>

    <div id="sidebar">

      <div class="panel">
        <div class="panel-header">
          <div class="panel-accent"></div>
          <span class="panel-title">About</span>
          <div class="panel-actions">
            <span class="panel-action">&#128279;</span>
            <span class="panel-action">&#9660;</span>
          </div>
        </div>
        <div class="panel-body">
          <img src="https://github.com/draygonia.png" alt="Draygonia" class="user-avatar">
          <div class="user-name">Draygonia</div>
          <div class="user-meta">site admin &middot; est. 2002</div>
          <div class="user-status"><span class="status-dot"></span> online now</div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">
          <div class="panel-accent"></div>
          <span class="panel-title">Navigate</span>
        </div>
        <div class="panel-body" style="padding:8px 0">
          <a href="index.html" style="display:block;padding:6px 12px;font-size:12px;color:var(--text-muted)">&#9656; Posts</a>
          <a href="links.html" style="display:block;padding:6px 12px;font-size:12px;color:var(--accent)">&#9656; Links</a>
          <a href="admin.html" style="display:block;padding:6px 12px;font-size:12px;color:var(--text-muted)">&#9656; Admin</a>
        </div>
      </div>

    </div>
  </div>

  <footer>
    <p>Draygonia &copy; 2026</p>
  </footer>

  <script src="js/config.js"></script>
  <script src="js/github.js"></script>
  <script src="js/app.js"></script>
  <script>
    loadLinksGrid('links-grid');
    const savedAccent = localStorage.getItem('theme-accent');
    if (savedAccent) document.documentElement.style.setProperty('--accent', savedAccent);
  </script>
</body>
</html>
