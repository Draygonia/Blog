<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Draygonia</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="site-header">
    <div id="site-header-inner">
      <a id="site-logo" href="index.html">
        <div id="logo-box"><img id="site-logo-img" class="logo-img" style="display:none" alt=""><span class="logo-letter">D</span></div>
        <span id="logo-name">Draygonia</span>
      </a>
      <input type="search" id="site-search" placeholder="search...">
    </div>
  </div>

  <div id="admin-bar">
    <a href="index.html" class="admin-btn">POSTS</a>
    <a href="links.html" class="admin-btn">LINKS</a>
    <a href="socials.html" class="admin-btn">SOCIALS</a>
    <a href="donate.html" class="admin-btn">DONATE</a>
    <a href="admin.html" class="admin-btn">ADMIN</a>
  </div>

  <div id="site-banner">
    <div id="banner-logo">
      <div id="banner-logo-box"><img id="banner-logo-img" class="logo-img" style="display:none" alt=""><span class="logo-letter">D</span></div>
      <span id="banner-title">Draygonia</span>
    </div>
  </div>

  <div id="page-wrapper">

    <div id="main-content">
      <div id="posts-grid">
        <div class="loading"><div class="spinner"></div> Loading posts&hellip;</div>
      </div>
    </div>

    <div id="sidebar">

      <div class="panel">
        <div class="panel-header">
          <div class="panel-accent"></div>
          <span class="panel-title">About</span>
          <div class="panel-actions">
            <span class="panel-action" title="Copy link">&#128279;</span>
            <span class="panel-action" title="Collapse">&#9660;</span>
          </div>
        </div>
        <div class="panel-body">
          <div class="avatar-wrapper" onclick="changeAvatar()" title="Click to change avatar">
            <img src="https://github.com/draygonia.png" alt="Draygonia" class="user-avatar" id="user-avatar">
            <div class="avatar-edit-overlay">&#9998;</div>
          </div>
          <div class="user-name">Draygonia</div>
          <div class="user-meta">site admin &middot; est. 2002</div>
          <div class="user-status"><span class="status-dot"></span> online now</div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">
          <div class="panel-accent"></div>
          <span class="panel-title">Theme</span>
          <div class="panel-actions">
            <span class="panel-action" title="Collapse">&#9660;</span>
          </div>
        </div>
        <div class="panel-body">
          <div class="theme-swatches">
            <div class="swatch active" style="background:#e07a10" data-theme="orange" onclick="applyTheme('orange')" title="Orange"></div>
            <div class="swatch" style="background:#cc3020" data-theme="red" onclick="applyTheme('red')" title="Red"></div>
            <div class="swatch" style="background:#2ea840" data-theme="green" onclick="applyTheme('green')" title="Green"></div>
            <div class="swatch" style="background:#c0ccd8" data-theme="silver" onclick="applyTheme('silver')" title="Silver"></div>
            <div class="swatch" style="background:#1a1a2a" data-theme="dark" onclick="applyTheme('dark')" title="Dark"></div>
            <div class="swatch" style="background:#8a30c8" data-theme="purple" onclick="applyTheme('purple')" title="Purple"></div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <footer>
    <p>Draygonia &copy; 2026</p>
  </footer>

  <script src="js/config.js"></script>
  <script src="js/github.js"></script>
  <script src="js/app.js"></script>
  <script src="js/search.js"></script>
  <script src="js/banner.js"></script>
  <script src="js/theme.js"></script>
  <script>
    loadPostsGrid('posts-grid');
  </script>
</body>
</html>
