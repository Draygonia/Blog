<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Draygonia</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="site-header">
    <div id="site-header-inner">
      <a id="site-logo" href="index.html">
        <div id="logo-box">D</div>
        <span id="logo-name">Draygonia</span>
      </a>
      <input type="search" id="site-search" placeholder="search...">
    </div>
  </div>

  <div id="admin-bar">
    <a href="admin.html" class="admin-btn">+ ADD</a>
    <a href="admin.html" class="admin-btn" id="manage-btn">MANAGE</a>
    <button class="admin-btn" onclick="shufflePosts()">&#8652; SHUFFLE</button>
    <button class="admin-btn" id="mobile-btn" onclick="toggleMobileView()">&#128241; MOBILE</button>
  </div>

  <div id="site-banner">
    <div id="banner-logo">
      <div id="banner-logo-box">D</div>
      <span id="banner-title">Draygonia</span>
    </div>
  </div>

  <div id="page-wrapper">

    <div id="main-content">
      <div id="posts-grid">
        <div class="loading"><div class="spinner"></div> Loading posts&hellip;</div>
      </div>
    </div>

    <div id="sidebar">

      <div class="panel">
        <div class="panel-header">
          <div class="panel-accent"></div>
          <span class="panel-title">About</span>
          <div class="panel-actions">
            <span class="panel-action" title="Copy link">&#128279;</span>
            <span class="panel-action" title="Collapse">&#9660;</span>
          </div>
        </div>
        <div class="panel-body">
          <div class="avatar-wrapper" onclick="changeAvatar()" title="Click to change avatar">
            <img src="https://github.com/draygonia.png" alt="Draygonia" class="user-avatar" id="user-avatar">
            <div class="avatar-edit-overlay">&#9998;</div>
          </div>
          <div class="user-name">Draygonia</div>
          <div class="user-meta">site admin &middot; est. 2002</div>
          <div class="user-status"><span class="status-dot"></span> online now</div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">
          <div class="panel-accent"></div>
          <span class="panel-title">Theme</span>
          <div class="panel-actions">
            <span class="panel-action" title="Collapse">&#9660;</span>
          </div>
        </div>
        <div class="panel-body">
          <div class="theme-sub-label">Color</div>
          <div class="theme-swatches">
            <div class="swatch active" style="background:#e07a10" data-theme="orange" onclick="applyTheme('orange')" title="Orange"></div>
            <div class="swatch" style="background:#cc3020" data-theme="red" onclick="applyTheme('red')" title="Red"></div>
            <div class="swatch" style="background:#2ea840" data-theme="green" onclick="applyTheme('green')" title="Green"></div>
            <div class="swatch" style="background:#c0ccd8" data-theme="silver" onclick="applyTheme('silver')" title="Silver"></div>
            <div class="swatch" style="background:#1a1a2a" data-theme="dark" onclick="applyTheme('dark')" title="Dark"></div>
            <div class="swatch" style="background:#8a30c8" data-theme="purple" onclick="applyTheme('purple')" title="Purple"></div>
          </div>
          <div class="theme-sub-label">Banner</div>
          <div class="banner-options" id="banner-options">
            <!-- populated by theme.js -->
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">
          <div class="panel-accent"></div>
          <span class="panel-title">Wallets</span>
          <div class="panel-actions">
            <span class="panel-action" title="Collapse">&#9660;</span>
          </div>
        </div>
        <div class="panel-body" style="padding:8px">
          <div id="wallets-list"></div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">
          <div class="panel-accent"></div>
          <span class="panel-title">Compose New Post</span>
          <div class="panel-actions">
            <span class="panel-action" title="Collapse">&#9660;</span>
          </div>
        </div>
        <div class="panel-body" style="padding:8px">
          <a href="admin.html" class="compose-area">
            <div class="compose-placeholder">DROP A<br>LINK,<br>IMAGE,<br>VIDEO,<br>OR<br>FILE &mdash;<br>OR PASTE<br>A URL<br>BELOW</div>
            <div class="compose-links">
              <a href="admin.html">markdown</a><br>
              <a href="admin.html">images</a><br>
              <a href="admin.html">links</a>
            </div>
          </a>
        </div>
      </div>

    </div>
  </div>

  <footer>
    <p>Draygonia &copy; 2026</p>
  </footer>

  <script src="js/config.js"></script>
  <script src="js/github.js"></script>
  <script src="js/app.js"></script>
  <script src="js/wallets.js"></script>
  <script src="js/banner.js"></script>
  <script src="js/theme.js"></script>
  <script>
    loadPostsGrid('posts-grid');
    loadWalletsPanel('wallets-list');

    // Populate banner options from BANNERS array
    document.addEventListener('DOMContentLoaded', function() {
      const container = document.getElementById('banner-options');
      BANNERS.forEach(function(b) {
        const el = document.createElement('div');
        el.className = 'banner-opt';
        el.dataset.banner = b.id;
        el.style.background = b.preview;
        el.title = b.label;
        el.onclick = function() { applyBanner(b.id, b.css); };
        container.appendChild(el);
      });
      const customBtn = document.createElement('button');
      customBtn.className = 'banner-custom-btn';
      customBtn.textContent = '+ URL';
      customBtn.onclick = promptCustomBanner;
      container.appendChild(customBtn);
    });

    function shufflePosts() {
      const grid = document.getElementById('posts-grid');
      const cards = Array.from(grid.querySelectorAll('.post-card'));
      for (let i = cards.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        grid.appendChild(cards[j]);
        [cards[i], cards[j]] = [cards[j], cards[i]];
      }
    }
  </script>
</body>
</html>
